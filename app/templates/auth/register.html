{% extends 'base.html' %}

{% block title %}{{ _('Register') }}{% endblock %}

{% block content %}
<div class="container-fluid mb-3">
  <div class="row">
    <div class="col-lg-5 col-md-8 col-12 mx-auto">
      <h2 class="mt-3 mb-5 text-center">
        {{ _('Sign Up') }}
        <hr class="w-50 mx-auto">
      </h2>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" aria-describedby="username-help">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" aria-describedby="password-help">
        </div>
        <div class="mb-3">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm-password">
        </div>
        <div class="d-flex justify-content-between">
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="terms">
            <label class="form-check-label" for="terms">I Agree on <a href="#">Terms & Conditions</a></label>
          </div>
          <p><a href="#">Forgot Password?</a></p>
        </div>
        
        <div class="d-grid col-12 mx-auto">
          <button type="submit" class="btn btn-ink py-2">Sign Up</button>
        </div>
      </form>
      <p class="mt-5 text-center text-secondary fw-bold">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
    <div class="p-0 col-lg-6 d-lg-block d-none">
      <img class="w-100 vh-100" src="{{ url_for('static', filename='assets/bookshelf.jpeg') }}">
    </div>
  </div>
</div>
{% endblock %}
