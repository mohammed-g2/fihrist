{% extends 'base.html' %}

{% block title %}{{ _('Conversations') }}{% endblock %}


{% block content %}
<div class="container">
  <div class="row">
    <div class="col-lg-4 col-md-6 col-12">
      <h4 class="mt-4">{{ _('All Conversations') }}</h4>
      <hr class="mb-4">
      {% for conv in conversations %}
        <a 
          href="{{ url_for('user.send_message', to=conv['recipient'].username) }}" 
          class="
            mt-3 bg-white 
            d-block border 
            border-1 rounded-2 
            p-3 text-decoration-none 
            {% if not conv['is_read'] %}fw-bold{% else %}{% endif %}">
          <div>
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0">
                <img class="rounded-circle" src="{{ conv['recipient'].gavatar(36) }}" alt="profile image">
              </div>
              <div class="flex-grow-1 ms-3">@{{ conv['recipient'].username }}</div>
            </div>
          </div>
          <small><span class="time">{{ conv['conv'].created_at }}</span></small>
        </a>
      {% endfor %}
    </div>
  </div>
</div>

{% endblock %}
